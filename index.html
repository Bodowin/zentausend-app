<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- APP EINSTELLUNGEN (PWA) -->
    <title>10.000</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/566/566294.png"> <!-- Ein Würfel Icon für den Home Screen -->
    
    <!-- LIBRARIES -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: #e2e8f0; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior: none; /* Verhindert "Bounce" Effekt beim Scrollen */
        }
        button { touch-action: manipulation; }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* iPhone Safe Area Fixes */
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const WINNING_SCORE = 10000;
        const PRESETS = ["Gabi", "Mabi", "Dana", "Bodo"];
        
        // --- ICONS ---
        const IconTrophy = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>;
        const IconRefresh = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>;
        const IconCheck = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>;
        const IconTrash = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>;
        const IconUserPlus = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>;
        const IconX = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>;
        const IconUsers = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>;
        const IconRotate = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>;
        const IconChart = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>;
        const IconHistory = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>;

        const ODDS = {
            1: { pct: 33, text: "Extremes Risiko", color: "text-red-500", bar: "bg-red-600" },
            2: { pct: 56, text: "Hohes Risiko", color: "text-orange-500", bar: "bg-orange-500" },
            3: { pct: 72, text: "Moderates Risiko", color: "text-yellow-400", bar: "bg-yellow-400" },
            4: { pct: 84, text: "Gute Chance", color: "text-lime-400", bar: "bg-lime-400" },
            5: { pct: 92, text: "Sehr sicher", color: "text-emerald-400", bar: "bg-emerald-400" },
            6: { pct: 98, text: "Fast garantiert", color: "text-emerald-500", bar: "bg-emerald-500" }
        };

        const calculateScore = (dice) => {
            if (dice.length === 0) return { score: 0, label: '', isValid: true, invalidDice: [] };
            const counts = {};
            dice.forEach(d => counts[d] = (counts[d] || 0) + 1);
            const distinctNumbers = Object.keys(counts).length;

            if (dice.length === 6 && distinctNumbers === 6) return { score: 1500, label: 'Straße!', isValid: true, invalidDice: [] };
            
            let pairsCount = 0;
            Object.values(counts).forEach(c => { if (c === 2) pairsCount++; });
            if (dice.length === 6 && pairsCount === 3) return { score: 1500, label: '3 Paare!', isValid: true, invalidDice: [] };

            let score = 0;
            let invalidDice = [];
            let comboLabel = '';

            for (let num = 1; num <= 6; num++) {
                const count = counts[num] || 0;
                if (count === 0) continue;
                if (count >= 3) {
                    let baseValue = (num === 1) ? 1000 : (num === 5 ? 500 : num * 100);
                    score += baseValue + ((count - 3) * 1000);
                    if(count > 3) comboLabel = `${count}er Pasch!`;
                } else {
                    if (num === 1) score += count * 100;
                    else if (num === 5) score += count * 50;
                    else for(let i=0; i<count; i++) invalidDice.push(num);
                }
            }
            return { score, label: comboLabel, isValid: invalidDice.length === 0, invalidDice };
        };

        const saveGameToHistory = (winner, allPlayers) => {
            try {
                const gameRecord = {
                    date: new Date().toISOString(),
                    winner: winner.name,
                    winnerScore: winner.score,
                    players: allPlayers.map(p => ({ name: p.name, score: p.score }))
                };
                const existingHistory = JSON.parse(localStorage.getItem('10k_history_clique') || '[]');
                const newHistory = [gameRecord, ...existingHistory].slice(0, 100);
                localStorage.setItem('10k_history_clique', JSON.stringify(newHistory));
            } catch (e) { console.error("Save error", e); }
        };

        const getHistory = () => {
            try { return JSON.parse(localStorage.getItem('10k_history_clique') || '[]'); } catch (e) { return []; }
        };

        const App = () => {
            const [gameState, setGameState] = useState('setup');
            const [players, setPlayers] = useState([]); 
            const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
            const [round, setRound] = useState(1);
            
            const [winner, setWinner] = useState(null);
            const [targetScore, setTargetScore] = useState(0); 
            const [finisherIdx, setFinisherIdx] = useState(null);

            const [currentDice, setCurrentDice] = useState([]);
            const [accumulatedScore, setAccumulatedScore] = useState(0);
            const [turnScore, setTurnScore] = useState(0);
            const [isValid, setIsValid] = useState(true);
            const [invalidDiceList, setInvalidDiceList] = useState([]);
            const [lastAction, setLastAction] = useState("");
            
            const [setupName, setSetupName] = useState("");
            const [historyData, setHistoryData] = useState([]);

            useEffect(() => {
                const res = calculateScore(currentDice);
                setTurnScore(res.score);
                setIsValid(res.isValid);
                setInvalidDiceList(res.invalidDice);
                if (res.label) showAction(res.label);
            }, [currentDice]);

            const showAction = (msg) => {
                setLastAction(msg);
                setTimeout(() => setLastAction(""), 2000);
            };

            const addPlayer = (name) => {
                if (!name.trim() || players.some(p => p.name === name)) return;
                setPlayers(prev => [...prev, { name, score: 0, id: Date.now() + Math.random() }]);
                setSetupName("");
            };

            const removePlayer = (index) => setPlayers(prev => prev.filter((_, i) => i !== index));

            const startGame = () => {
                if (players.length < 2) return;
                setPlayers(prev => prev.map(p => ({...p, score: 0})));
                setRound(1);
                setCurrentPlayerIdx(0);
                setFinisherIdx(null);
                setWinner(null);
                setAccumulatedScore(0);
                setCurrentDice([]);
                setTurnScore(0);
                setGameState('active');
            };

            const addDie = (val) => {
                if (currentDice.length < 6 && gameState !== 'finished') setCurrentDice(prev => [...prev, val].sort());
            };

            const removeDie = (index) => setCurrentDice(prev => prev.filter((_, i) => i !== index));

            const handleRefill = () => {
                if (!isValid || turnScore === 0) return;
                setAccumulatedScore(prev => prev + turnScore);
                setCurrentDice([]);
                showAction("Refill!");
            };

            const handleBank = () => {
                if (!isValid) return;
                const totalPot = accumulatedScore + turnScore;
                if (totalPot === 0) return;

                setPlayers(prev => {
                    const newPlayers = [...prev];
                    newPlayers[currentPlayerIdx] = {
                        ...newPlayers[currentPlayerIdx],
                        score: newPlayers[currentPlayerIdx].score + totalPot
                    };
                    checkGameEndConditions(newPlayers[currentPlayerIdx].score, newPlayers);
                    return newPlayers;
                });
            };

            const checkGameEndConditions = (newScore, currentPlayersList) => {
                if (gameState === 'lastChance') {
                    if (newScore > targetScore) {
                        setTargetScore(newScore);
                        showAction("FÜHRUNG!");
                    }
                    setTimeout(nextTurn, 50);
                    return;
                }

                if (newScore >= WINNING_SCORE) {
                    setFinisherIdx(currentPlayerIdx);
                    if (currentPlayerIdx === currentPlayersList.length - 1) {
                        endGame(currentPlayersList);
                    } else {
                        setTargetScore(newScore);
                        setGameState('lastChance');
                        showAction("LETZTE RUNDE!");
                        setTimeout(nextTurn, 1000);
                    }
                } else {
                    setTimeout(nextTurn, 50);
                }
            };

            const handleBust = () => { showAction("NIETE!"); setTimeout(nextTurn, 700); };

            const nextTurn = () => {
                setAccumulatedScore(0);
                setCurrentDice([]);
                setTurnScore(0);

                if (gameState === 'lastChance') {
                    const nextIdx = (currentPlayerIdx + 1) % players.length;
                    if ((finisherIdx !== null && nextIdx === finisherIdx) || (finisherIdx === null && nextIdx === 0)) {
                        endGame(players);
                        return;
                    }
                }
                setCurrentPlayerIdx(prev => {
                    const next = (prev + 1) % players.length;
                    if (next === 0) setRound(r => r + 1);
                    return next;
                });
            };

            const endGame = (finalPlayers) => {
                const sorted = [...finalPlayers].sort((a, b) => b.score - a.score);
                const win = sorted[0];
                setWinner(win);
                setGameState('finished');
                saveGameToHistory(win, finalPlayers);
            };

            const showHistory = () => {
                setHistoryData(getHistory());
                setGameState('history');
            };

            const currentPlayer = players[currentPlayerIdx];
            const effectiveTarget = gameState === 'lastChance' ? targetScore + 1 : WINNING_SCORE;
            const neededForWin = currentPlayer ? Math.max(0, effectiveTarget - currentPlayer.score) : 0;
            const currentTotalPotential = accumulatedScore + turnScore;
            const neededAfterBank = Math.max(0, neededForWin - currentTotalPotential);

            const getRiskData = () => {
                let nextDiceCount = 0;
                if (currentDice.length === 6 && isValid && turnScore > 0) nextDiceCount = 6;
                else if (currentDice.length > 0 && currentDice.length < 6) nextDiceCount = 6 - currentDice.length;
                if (nextDiceCount === 0) return null;
                return ODDS[nextDiceCount];
            };
            const riskData = getRiskData();

            if (gameState === 'setup') {
                return (
                    <div className="min-h-screen bg-slate-900 text-slate-200 p-4 flex flex-col items-center max-w-md mx-auto safe-pb">
                        <div className="flex items-center gap-3 mb-6 mt-4 animate-pop">
                            <span className="text-amber-500 font-black text-4xl tracking-tighter">10K</span>
                            <div className="h-8 w-px bg-slate-700"></div>
                            <span className="text-slate-400 font-bold uppercase tracking-widest">Die Clique</span>
                        </div>

                        <div className="w-full bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700 mb-6">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-white font-bold flex items-center gap-2"><IconUsers /> Spielerwahl</h2>
                                <button onClick={showHistory} className="text-slate-400 hover:text-white flex items-center gap-1 text-xs bg-slate-700 px-2 py-1 rounded"><IconHistory /> Verlauf</button>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-3 mb-6">
                                {PRESETS.map(name => {
                                    const isAdded = players.some(p => p.name === name);
                                    return (
                                        <button key={name} onClick={() => isAdded ? removePlayer(players.findIndex(p => p.name === name)) : addPlayer(name)}
                                            className={`p-3 rounded-xl font-bold transition-all border-2 text-sm ${isAdded ? 'bg-emerald-600 border-emerald-500 text-white' : 'bg-slate-700 border-slate-600 text-slate-400 hover:bg-slate-600'}`}>
                                            {name}
                                        </button>
                                    );
                                })}
                            </div>

                            <div className="flex gap-2 mb-6">
                                <input type="text" value={setupName} onChange={(e) => setSetupName(e.target.value)} placeholder="Gast Name"
                                    className="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-amber-500 transition-colors"
                                    onKeyDown={(e) => e.key === 'Enter' && addPlayer(setupName)} />
                                <button onClick={() => addPlayer(setupName)} className="bg-slate-700 hover:bg-slate-600 px-4 rounded-xl text-slate-300"><IconUserPlus /></button>
                            </div>

                            <div className="space-y-2 max-h-48 overflow-y-auto">
                                {players.map((p, i) => (
                                    <div key={p.id} className="flex justify-between items-center bg-slate-900/50 p-3 rounded-lg border border-slate-700 animate-pop">
                                        <div className="flex items-center gap-3">
                                            <span className="bg-slate-800 text-slate-500 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">{i+1}</span>
                                            <span className="font-bold">{p.name}</span>
                                        </div>
                                        <button onClick={() => removePlayer(i)} className="text-slate-600 hover:text-red-400"><IconX /></button>
                                    </div>
                                ))}
                                {players.length === 0 && <div className="text-center text-slate-600 italic py-2">Wähle Spieler aus...</div>}
                            </div>
                        </div>

                        <button onClick={startGame} disabled={players.length < 2}
                            className="w-full bg-emerald-600 hover:bg-emerald-500 disabled:opacity-30 disabled:cursor-not-allowed text-white font-bold py-4 rounded-xl shadow-lg transition-all text-lg mb-8">
                            Start ({players.length})
                        </button>
                    </div>
                );
            }

            if (gameState === 'history') {
                return (
                    <div className="min-h-screen bg-slate-900 text-slate-200 p-4 flex flex-col items-center max-w-md mx-auto safe-pb">
                        <div className="w-full flex justify-between items-center mb-6 mt-4">
                            <h2 className="text-2xl font-bold text-white flex gap-2"><IconChart /> Statistik</h2>
                            <button onClick={() => setGameState('setup')} className="bg-slate-800 px-3 py-2 rounded-lg text-sm">Zurück</button>
                        </div>
                        
                        <div className="w-full space-y-3">
                            {historyData.length === 0 ? (
                                <div className="text-slate-500 text-center py-10">Noch keine Spiele gespeichert.</div>
                            ) : (
                                historyData.map((game, idx) => (
                                    <div key={idx} className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                                        <div className="flex justify-between items-center mb-2">
                                            <div className="text-xs text-slate-500">{new Date(game.date).toLocaleDateString()}</div>
                                            <div className="text-amber-500 font-bold flex items-center gap-1"><IconTrophy /> {game.winner}</div>
                                        </div>
                                        <div className="text-xs text-slate-400">
                                            Score: {game.winnerScore.toLocaleString()}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                );
            }

            if (!currentPlayer) return <div className="min-h-screen bg-slate-950 flex items-center justify-center text-white">Lade...</div>;

            return (
                <div className="min-h-screen bg-slate-950 text-slate-200 flex flex-col max-w-lg mx-auto border-x border-slate-900 shadow-2xl relative overflow-hidden safe-pb">
                    <div className={`px-4 py-3 flex justify-between items-center border-b transition-colors duration-500 pt-safe
                        ${gameState === 'lastChance' ? 'bg-red-900/20 border-red-900/50' : 'bg-slate-900 border-slate-800'}`}>
                        <div className="flex items-center gap-3">
                            <span className="text-amber-500 font-black text-2xl tracking-tighter">10K</span>
                            <div className="h-6 w-px bg-slate-700"></div>
                            <div className="flex flex-col leading-none">
                                {gameState === 'lastChance' ? (
                                    <span className="text-red-500 font-bold uppercase text-xs animate-pulse">Letzte Chance!</span>
                                ) : (
                                    <span className="text-slate-400 text-xs font-bold uppercase">Runde {round}</span>
                                )}
                                <span className="text-slate-500 text-[10px]">Ziel: {effectiveTarget.toLocaleString()}</span>
                            </div>
                        </div>
                        <button onClick={() => setGameState('setup')} className="p-2 text-slate-600 hover:text-slate-300 rounded-full hover:bg-slate-800"><IconRotate /></button>
                    </div>

                    <div className="h-28 border-b border-slate-800 bg-slate-950/50 overflow-x-auto whitespace-nowrap scrollbar-hide flex items-center px-2 gap-2">
                        {players.map((p, idx) => {
                            const isActive = currentPlayerIdx === idx && gameState !== 'finished';
                            return (
                                <div key={p.id} className={`inline-flex flex-col justify-center px-5 py-3 rounded-xl transition-all duration-300 min-w-[100px] border 
                                    ${isActive ? 'bg-slate-800 border-amber-500/50 shadow-lg scale-105 z-10' : 'bg-slate-900/30 border-transparent opacity-60 grayscale'}`}>
                                    <div className="flex justify-between items-center mb-1 gap-2">
                                        <span className={`text-xs font-bold uppercase tracking-wider truncate max-w-[80px] ${isActive ? 'text-white' : 'text-slate-500'}`}>{p.name}</span>
                                        {p.score >= WINNING_SCORE && <span className="text-yellow-500"><IconTrophy /></span>}
                                    </div>
                                    <div className={`text-2xl font-mono font-black tracking-tighter ${isActive ? 'text-amber-400' : 'text-slate-400'}`}>
                                        {p.score.toLocaleString()}
                                    </div>
                                    {isActive && <div className="text-[10px] text-emerald-400 font-bold mt-1 text-center">AM ZUG</div>}
                                </div>
                            )
                        })}
                    </div>

                    <div className="bg-slate-900/50 p-3 border-b border-slate-800 text-xs font-mono grid grid-cols-2 gap-4">
                        <div>
                            <div className="text-slate-500 mb-1">Benötigt zum Sieg</div>
                            <div className="text-white text-lg font-bold leading-none">{neededForWin > 0 ? neededForWin.toLocaleString() : "Ziel erreicht"}</div>
                        </div>
                        <div className="text-right">
                             <div className="text-slate-500 mb-1">Nach Sichern</div>
                             {currentTotalPotential > 0 ? (
                                 <div className={`text-lg font-bold leading-none ${neededAfterBank <= 0 ? 'text-emerald-400' : 'text-slate-300'}`}>
                                    {neededAfterBank <= 0 ? "SIEG MÖGLICH" : neededAfterBank.toLocaleString() + " fehlen"}
                                 </div>
                             ) : <div className="text-slate-600">-</div>}
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col p-4 relative overflow-y-auto">
                        <div className="h-6 flex justify-center items-center mb-2">
                            {accumulatedScore > 0 && <span className="bg-slate-800 text-slate-300 px-3 py-0.5 rounded-full text-[10px] font-bold border border-slate-700 shadow animate-pop">BEREITS GESICHERT: {accumulatedScore}</span>}
                        </div>

                        <div className={`min-h-[100px] rounded-2xl border-2 flex flex-col items-center justify-center p-3 relative transition-colors duration-300 gap-3 ${isValid ? 'border-slate-800 bg-slate-900/50' : 'border-red-900/50 bg-red-900/10'}`}>
                            {currentDice.length === 0 ? <span className="text-slate-600 italic text-sm">Ergebnisse eintippen...</span> : 
                                <div className="flex flex-wrap justify-center gap-2">
                                    {currentDice.map((val, idx) => {
                                        const isBad = invalidDiceList.includes(val);
                                        return <button key={idx} onClick={() => removeDie(idx)} className={`w-12 h-12 rounded-lg flex items-center justify-center text-xl font-bold shadow-sm animate-pop transition-colors border-b-4 ${isBad ? 'bg-red-500 text-white border-red-700' : 'bg-slate-200 text-slate-900 border-slate-400 hover:bg-white'}`}>{val}</button>;
                                    })}
                                </div>
                            }
                            {currentDice.length > 0 && <button onClick={() => setCurrentDice([])} className="absolute top-2 right-2 text-slate-600 hover:text-slate-300 p-2"><IconTrash /></button>}
                        </div>

                        <div className="h-6 mt-1 flex justify-center items-center text-center">
                            {!isValid && currentDice.length > 0 && <span className="text-red-500 text-xs font-bold animate-pulse">Ungültige Würfel!</span>}
                            {lastAction && isValid && <span className="text-amber-500 text-xs font-bold uppercase tracking-widest animate-pop">{lastAction}</span>}
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center py-2">
                            <div className={`text-6xl font-black font-mono tracking-tighter transition-all duration-300 ${turnScore > 0 ? (isValid ? 'text-emerald-400' : 'text-slate-700') : 'text-slate-800'}`}>+{turnScore}</div>
                            {(accumulatedScore + turnScore) > 0 && isValid && <div className="text-slate-400 text-xs uppercase tracking-widest mt-1">Gesamtpotenzial: <span className="text-white font-bold text-base">{accumulatedScore + turnScore}</span></div>}
                        </div>

                        <div className="mb-4 h-10">
                            {riskData && isValid && currentDice.length > 0 && (
                                <div className="bg-slate-900 rounded-lg p-2 border border-slate-800 flex items-center gap-3 animate-pop">
                                    <div className="text-[10px] text-slate-500 uppercase w-20 leading-tight">Chance beim Weiterwürfeln:</div>
                                    <div className="flex-1">
                                        <div className="flex justify-between text-xs font-bold mb-1"><span className={riskData.color}>{riskData.text}</span><span className="text-slate-400">{riskData.pct}%</span></div>
                                        <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden"><div className={`h-full ${riskData.bar}`} style={{width: `${riskData.pct}%`}}></div></div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="mt-auto space-y-3">
                            <div className="grid grid-cols-6 gap-2">
                                {[1, 2, 3, 4, 5, 6].map(n => <button key={n} onClick={() => addDie(n)} disabled={currentDice.length >= 6 || gameState === 'finished'} className="h-14 bg-slate-800 rounded-xl border-b-4 border-slate-950 text-xl font-bold hover:bg-slate-700 active:border-b-0 active:translate-y-1 transition-all disabled:opacity-30 disabled:translate-y-0">{n}</button>)}
                            </div>

                            <div className="h-14">
                                {(turnScore === 0 && accumulatedScore === 0 && currentDice.length === 0) ? (
                                    <div className="grid grid-cols-[1fr_2fr] gap-3 h-full">
                                        <button onClick={handleBust} className="bg-slate-900 border border-red-900/30 text-red-700 font-bold rounded-xl hover:bg-red-900/20 transition-colors">Niete</button>
                                        <div className="border border-dashed border-slate-800 rounded-xl flex items-center justify-center text-slate-600 text-sm italic">Warte auf Wurf...</div>
                                    </div>
                                ) : (
                                    <>
                                        {currentDice.length === 6 && isValid && turnScore > 0 ? (
                                            <button onClick={handleRefill} className="w-full h-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-[0_4px_0_rgb(55,48,163)] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2 animate-pulse">
                                                <IconRefresh /><div className="flex flex-col items-start leading-none"><span>Refill & Weiter</span><span className="text-[10px] opacity-80 font-normal mt-0.5">98% Sicherheit</span></div>
                                            </button>
                                        ) : (
                                            <div className="grid grid-cols-[1fr_2fr] gap-3 h-full">
                                                <button onClick={handleBust} className="bg-slate-900 text-slate-500 hover:text-red-500 hover:border-red-900/50 border border-slate-800 font-bold rounded-xl transition-colors">Niete</button>
                                                <button onClick={handleBank} disabled={!isValid || currentTotalPotential === 0} className={`rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-[0_4px_0_rgba(0,0,0,0.3)] active:translate-y-1 active:shadow-none ${(isValid && currentTotalPotential > 0) ? 'bg-emerald-600 text-white hover:bg-emerald-500 shadow-[0_4px_0_rgb(6,78,59)]' : 'bg-slate-800 text-slate-600 cursor-not-allowed shadow-none'}`}>
                                                    <IconCheck /><span>{currentTotalPotential} Sichern</span>
                                                </button>
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        </div>
                    </div>

                    {winner && (
                        <div className="absolute inset-0 z-50 glass flex flex-col items-center justify-center p-6 animate-pop">
                            <div className="bg-slate-900 border border-amber-500/30 p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full">
                                <span className="text-yellow-500 flex justify-center mb-4"><IconTrophy /></span>
                                <h2 className="text-4xl font-black text-white mb-2">SIEG!</h2>
                                <p className="text-amber-500 text-2xl font-bold uppercase tracking-widest mb-8">{winner.name}</p>
                                <div className="space-y-2 mb-8 bg-slate-950/50 p-6 rounded-2xl border border-slate-800 max-h-60 overflow-y-auto">
                                    {[...players].sort((a,b)=>b.score-a.score).map((p, i) => (
                                        <div key={p.id} className={`flex justify-between ${i===0?'text-amber-400 font-bold':(p.name===winner.name?'text-white font-bold':'text-slate-400')}`}><span>{i+1}. {p.name}</span><span>{p.score.toLocaleString()}</span></div>
                                    ))}
                                </div>
                                <button onClick={() => setGameState('setup')} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">Neues Spiel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
