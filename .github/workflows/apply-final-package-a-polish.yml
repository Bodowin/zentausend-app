name: Apply final package A polish

on:
  push:
    branches:
      - chatgpt/package-a-state-safety

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt/package-a-state-safety

      - name: Apply guarded patch
        run: node scripts/apply-final-package-a-polish.mjs

      - name: Remove one-time patch machinery
        run: git rm scripts/apply-final-package-a-polish.mjs .github/workflows/apply-final-package-a-polish.yml

      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/components/StatsScreen.tsx
          git commit -m "Polish resume feedback and history controls"
          git push origin HEAD:chatgpt/package-a-state-safety
