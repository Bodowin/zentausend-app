name: Apply performance split

on:
  push:
    branches:
      - chatgpt/package-b-performance
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'chatgpt/package-b-performance'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt/package-b-performance

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply guarded performance patch
        run: node scripts/apply-performance-split.mjs

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Capture compiler output on failure
        if: failure()
        run: |
          npm run build > docs/performance-build-error.txt 2>&1 || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/performance-build-error.txt
          git commit -m "Capture performance build error"
          git push origin HEAD:chatgpt/package-b-performance

      - name: Remove one-time patch machinery
        run: git rm scripts/apply-performance-split.mjs .github/workflows/apply-performance-split.yml

      - name: Commit optimized source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/components/GameScreen.tsx src/components/DiceArena.tsx src/lib/dicePips.ts src/performanceBoundaries.test.ts
          git commit -m "Lazy-load heavy game modules"
          git push origin HEAD:chatgpt/package-b-performance
