name: Package U validation

on:
  push:
    branches:
      - agent/package-u-bulk-event-assignment
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    if: github.event_name != 'push' || github.event.head_commit.message != 'Commit validated package U product files'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: agent/package-u-bulk-event-assignment

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply bulk assignment integration
        run: python3 scripts/apply-package-u.py

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Chromium browser suite
        run: npx playwright test

      - name: WebKit browser suite
        run: npx playwright test --config=playwright.webkit.config.ts

      - name: Commit validated product files
        run: |
          git config user.name "ChatGPT Package U"
          git config user.email "actions@github.com"
          git add \
            src/components/StatsScreen.tsx \
            src/lib/cloud.ts
          git diff --cached --quiet && exit 0
          git commit -m "Commit validated package U product files"
          git push origin HEAD:agent/package-u-bulk-event-assignment

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-u-failure-diagnostics
          path: |
            playwright-report
            playwright-report-webkit
            test-results
          if-no-files-found: ignore
