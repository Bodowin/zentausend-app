name: Apply player management

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-build-e2e:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'chatgpt/package-f-player-management'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt/package-f-player-management

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate guarded patch
        run: node --check scripts/apply-player-management-ui.mjs

      - name: Apply player management UI
        run: node scripts/apply-player-management-ui.mjs

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser journeys
        run: npm run test:e2e

      - name: Remove one-time machinery
        run: git rm -f scripts/apply-player-management-ui.mjs .github/workflows/apply-player-management.yml

      - name: Commit validated player management
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/playerIdentity.ts src/lib/playerIdentityManagement.test.ts src/lib/backup.ts src/components/PlayerManager.tsx src/components/StatsScreen.tsx e2e/player-management.spec.ts docs/package-f-player-management.md
          git commit -m "Manage duplicate player profiles safely"
          git push origin HEAD:chatgpt/package-f-player-management
