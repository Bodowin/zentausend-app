name: Apply history validation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'chatgpt/package-c-history-validation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt/package-c-history-validation

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare guarded patch
        run: node scripts/prepare-history-patch.mjs

      - name: Apply guarded history patch
        run: node scripts/apply-history-validation.mjs

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Remove one-time patch machinery
        run: git rm scripts/apply-history-validation.mjs scripts/prepare-history-patch.mjs .github/workflows/apply-history-validation.yml

      - name: Commit validated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/storage.ts src/lib/backup.ts src/lib/cloud.ts src/components/StatsScreen.tsx src/lib/gameRecordValidation.ts src/lib/gameRecordValidation.test.ts src/historyIntegrityWiring.test.ts docs/package-c-history-validation.md
          git commit -m "Validate and quarantine historical game data"
          git push origin HEAD:chatgpt/package-c-history-validation
