name: Package W validation

on:
  push:
    branches:
      - agent/package-w-endgame-clarity
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    if: github.event_name != 'push' || github.event.head_commit.message != 'Commit validated package W integration'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: agent/package-w-endgame-clarity

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Separate chart label integration
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-package-w.py')
          text = path.read_text()
          start_marker = "replace_once(\n    'src/components/GameChart.tsx',\n    \"                   {directLabels"
          next_marker = "replace_once(\n    'src/components/GameScreen.tsx'"
          start = text.find(start_marker)
          next_start = text.find(next_marker, start + 1)
          if start < 0 or next_start < 0:
              raise SystemExit(f'Could not isolate direct-label replacement: start={start}, next={next_start}')
          path.write_text(text[:start] + text[next_start:])
          PY

      - name: Apply package W integration
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/apply-package-w.py 2>&1 | tee package-w-patch-output.txt
          python3 scripts/apply-package-w-chart-labels.py 2>&1 | tee -a package-w-patch-output.txt

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Chromium browser suite
        run: npx playwright test

      - name: WebKit browser suite
        run: npx playwright test --config=playwright.webkit.config.ts

      - name: Commit validated product integration
        if: github.event_name == 'push'
        run: |
          git config user.name "ChatGPT Package W"
          git config user.email "actions@github.com"
          git add src/App.tsx src/components/GameChart.tsx src/components/GameScreen.tsx
          git diff --cached --quiet && exit 0
          git commit -m "Commit validated package W integration"
          git push origin HEAD:agent/package-w-endgame-clarity

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-w-failure-diagnostics
          path: |
            package-w-patch-output.txt
            playwright-report
            playwright-report-webkit
            test-results
          if-no-files-found: ignore
