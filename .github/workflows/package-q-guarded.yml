name: Package Q guarded apply

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.head_ref == 'chatgpt/package-q-turn-corrections'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply turn correction patch
        run: node scripts/apply-package-q.mjs

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Targeted correction journey in Chromium
        run: npx playwright test e2e/turn-corrections.spec.ts

      - name: Targeted correction journey in WebKit
        run: npx playwright test --config=playwright.webkit.config.ts e2e/turn-corrections.spec.ts

      - name: Commit validated product changes
        run: |
          rm scripts/apply-package-q.mjs
          rm .github/workflows/package-q-guarded.yml
          git config user.name "ChatGPT Package Q"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Add safe round log corrections"
          git push origin HEAD:${{ github.head_ref }}
