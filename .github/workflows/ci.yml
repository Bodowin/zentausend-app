name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Upload package Y1 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-y1-vitest
          path: /tmp/y1-vitest.log
          if-no-files-found: ignore

      - name: Production build
        run: npm run build
