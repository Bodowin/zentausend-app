name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Upload validated package Y1 files
        uses: actions/upload-artifact@v4
        with:
          name: package-y1-validated-files
          path: |
            src/App.tsx
            src/cloudIdentityWiring.test.ts
            src/components/AnalysisScreen.tsx
            src/components/DiceArena.tsx
            src/components/GameScreen.tsx
            src/components/StatsScreen.tsx
            src/lib/cloud.ts
            src/lib/cloud.parallel.test.ts
            e2e/audit-fixes.spec.ts
            e2e/player-management.spec.ts
          if-no-files-found: error

      - name: Production build
        run: npm run build
