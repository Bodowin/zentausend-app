name: Apply natural dice on main

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-build-e2e:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'chatgpt/natural-dice-validated'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout validation branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt/natural-dice-validated

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply guarded natural dice patch
        id: patch
        continue-on-error: true
        run: |
          set -o pipefail
          node --check scripts/apply-natural-dice-main.mjs 2>&1 | tee /tmp/package-i-patch.log
          node scripts/apply-natural-dice-main.mjs 2>&1 | tee -a /tmp/package-i-patch.log

      - name: Unit tests
        id: unit
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/package-i-unit.log

      - name: Production build
        id: build
        if: steps.patch.outcome == 'success' && steps.unit.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/package-i-build.log

      - name: Install Chromium
        id: chromium
        if: steps.patch.outcome == 'success' && steps.unit.outcome == 'success' && steps.build.outcome == 'success'
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Browser journeys
        id: e2e
        if: steps.chromium.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:e2e 2>&1 | tee /tmp/package-i-e2e.log

      - name: Record safe diagnostic
        if: steps.patch.outcome == 'failure' || steps.unit.outcome == 'failure' || steps.build.outcome == 'failure' || steps.chromium.outcome == 'failure' || steps.e2e.outcome == 'failure'
        run: |
          git reset --hard HEAD
          git clean -fd
          mkdir -p docs
          {
            echo '# Paket I – Workflow-Diagnose'
            echo
            echo "Patch: ${{ steps.patch.outcome }}"
            echo "Unit: ${{ steps.unit.outcome }}"
            echo "Build: ${{ steps.build.outcome }}"
            echo "Chromium: ${{ steps.chromium.outcome }}"
            echo "E2E: ${{ steps.e2e.outcome }}"
            for file in /tmp/package-i-patch.log /tmp/package-i-unit.log /tmp/package-i-build.log /tmp/package-i-e2e.log; do
              if [ -f "$file" ]; then
                echo
                echo "## $(basename "$file")"
                echo '```text'
                tail -n 140 "$file"
                echo '```'
              fi
            done
          } > docs/package-i-workflow-diagnostic.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/package-i-workflow-diagnostic.md
          git commit -m "Record package I workflow diagnostic"
          git push origin HEAD:chatgpt/natural-dice-validated
          exit 1

      - name: Remove one-time machinery
        if: steps.e2e.outcome == 'success'
        run: git rm -f --ignore-unmatch scripts/apply-natural-dice-main.mjs .github/workflows/apply-natural-dice-main.yml docs/package-i-workflow-diagnostic.md

      - name: Commit validated natural dice update
        if: steps.e2e.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/diceThrowSeed.ts src/lib/diceThrowSeed.test.ts src/lib/prefs.ts src/components/SettingsModal.tsx src/components/GameScreen.tsx src/components/DiceArena.tsx src/naturalDiceWiring.test.ts e2e/app.spec.ts docs/package-i-natural-dice.md
          git commit -m "Make virtual dice motion natural and sensor prompts optional"
          git push origin HEAD:chatgpt/natural-dice-validated
