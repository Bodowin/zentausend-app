name: Package S validation

on:
  push:
    branches:
      - agent/package-s-game-finale
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    if: github.event_name != 'push' || github.event.head_commit.message != 'Commit validated package S product files'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: agent/package-s-game-finale

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply game-finale integration
        run: python3 scripts/apply-package-s-v2.py

      - name: Production build
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          cat build.log
          exit $status

      - name: Unit tests
        run: npm test

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Chromium browser suite
        run: npx playwright test

      - name: WebKit browser suite
        run: npx playwright test --config=playwright.webkit.config.ts

      - name: Commit validated product files
        run: |
          git config user.name "ChatGPT Package S"
          git config user.email "actions@github.com"
          git add src/components/GameScreen.tsx
          git diff --cached --quiet && exit 0
          git commit -m "Commit validated package S product files"
          git push origin HEAD:agent/package-s-game-finale

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-s-failure-diagnostics
          path: |
            build.log
            src/components/GameScreen.tsx
            playwright-report
            playwright-report-webkit
            test-results
          if-no-files-found: ignore
