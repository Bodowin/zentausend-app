name: Apply player identities

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'chatgpt/package-d-player-identities'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt/package-d-player-identities

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate patch scripts
        run: |
          node --check scripts/apply-player-identities.mjs
          node --check scripts/remove-unused-player-uid.mjs

      - name: Apply guarded identity patch
        id: patch
        run: |
          set +e
          node scripts/apply-player-identities.mjs 2>&1 | tee player-identity-patch-error.txt
          status=${PIPESTATUS[0]}
          if [ "$status" -eq 0 ]; then node scripts/remove-unused-player-uid.mjs; fi
          exit $status

      - name: Capture patch mismatch
        if: failure() && steps.patch.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add player-identity-patch-error.txt
          git commit -m "Capture player identity patch failure"
          git push origin HEAD:chatgpt/package-d-player-identities

      - name: Unit tests
        run: npm test

      - name: Production build
        id: build
        continue-on-error: true
        run: |
          set +e
          npm run build 2>&1 | tee player-identity-build-error.txt
          status=${PIPESTATUS[0]}
          exit $status

      - name: Capture build failure
        if: steps.build.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add player-identity-build-error.txt
          git commit -m "Capture player identity build failure"
          git push origin HEAD:chatgpt/package-d-player-identities

      - name: Stop after failed build
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Remove one-time patch machinery
        run: git rm -f scripts/apply-player-identities.mjs scripts/remove-unused-player-uid.mjs .github/workflows/apply-player-identities.yml

      - name: Commit validated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/components/StatsScreen.tsx src/lib/types.ts src/lib/roster.ts src/lib/gameRecordValidation.ts src/lib/storage.ts src/lib/playerIdentity.ts src/lib/playerIdentity.test.ts src/lib/storageIdentity.test.ts docs/package-d-player-identities.md docs/package-d-device-test-plan.md
          git commit -m "Keep player statistics stable across renames"
          git push origin HEAD:chatgpt/package-d-player-identities
