name: Setup browser E2E

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  setup-test-commit:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'chatgpt/package-e-browser-e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt/package-e-browser-e2e

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install current dependencies
        run: npm ci

      - name: Validate guarded patch
        run: node --check scripts/apply-e2e-accessibility.mjs

      - name: Apply accessibility semantics
        run: node scripts/apply-e2e-accessibility.mjs

      - name: Install Playwright Test
        run: |
          npm install --save-dev @playwright/test
          npm pkg set 'scripts.test:e2e=playwright test'

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser journeys
        run: npm run test:e2e

      - name: Remove one-time setup machinery
        run: git rm -f scripts/apply-e2e-accessibility.mjs .github/workflows/setup-e2e.yml

      - name: Commit validated E2E suite
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json playwright.config.ts vitest.config.ts e2e/app.spec.ts .github/workflows/e2e.yml src/components/GameScreen.tsx docs/package-e-browser-e2e.md
          git commit -m "Run critical journeys in Chromium"
          git push origin HEAD:chatgpt/package-e-browser-e2e
