name: Package R validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: chatgpt/package-r-paused-games

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply paused-game integration
        id: patch
        continue-on-error: true
        run: python3 scripts/run-package-r.py > package-r-patch.log 2>&1

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-r-patch-diagnostics
          path: package-r-patch.log
          if-no-files-found: error

      - name: Stop after patch error
        if: steps.patch.outcome == 'failure'
        run: |
          cat package-r-patch.log
          exit 1

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Targeted paused-game journey in Chromium
        run: npx playwright test e2e/paused-games.spec.ts

      - name: Targeted paused-game journey in WebKit
        run: npx playwright test --config=playwright.webkit.config.ts e2e/paused-games.spec.ts

      - name: Stage validated files
        run: |
          mkdir -p validated/src/components
          cp src/App.tsx validated/src/App.tsx
          cp src/components/SetupScreen.tsx validated/src/components/SetupScreen.tsx
          cp playwright.webkit.config.ts validated/playwright.webkit.config.ts

      - name: Upload validated files
        uses: actions/upload-artifact@v4
        with:
          name: package-r-validated-files
          path: validated
          if-no-files-found: error
