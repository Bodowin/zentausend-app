name: Package R validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: chatgpt/package-r-paused-games
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply paused-game integration
        run: python3 scripts/run-package-r.py

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Targeted paused-game journey in Chromium
        run: npx playwright test e2e/paused-games.spec.ts

      - name: Targeted paused-game journey in WebKit
        run: npx playwright test --config=playwright.webkit.config.ts e2e/paused-games.spec.ts

      - name: Commit validated product state
        run: |
          git config user.name "ChatGPT Package R"
          git config user.email "actions@github.com"
          git add src/App.tsx src/components/SetupScreen.tsx playwright.webkit.config.ts
          git rm -f .github/workflows/package-r-validate.yml scripts/apply-package-r.py scripts/run-package-r.py docs/package-r-implementation-note.md || true
          git commit -m "Add multiple paused games and 14-day archive"
          git push origin HEAD:chatgpt/package-r-paused-games
