name: Package O guarded apply

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.head_ref == 'chatgpt/package-o-iphone-gameflow'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply product patch and tests
        run: |
          node scripts/apply-package-o.mjs
          node scripts/create-package-o-tests.mjs

      - name: Unit tests
        run: npm test

      - name: Production build
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          npm run build 2>&1 | tee package-o-build.log

      - name: Upload build diagnostics
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: package-o-build-diagnostics
          path: package-o-build.log
          retention-days: 3

      - name: Stop after failed build
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: iPhone game-flow journey
        run: npx playwright test e2e/iphone-gameflow.spec.ts

      - name: Commit validated product changes
        run: |
          rm scripts/apply-package-o.mjs scripts/create-package-o-tests.mjs .github/workflows/package-o-apply.yml
          git config user.name "Bodo"
          git config user.email "47588175+Bodowin@users.noreply.github.com"
          git add src/App.tsx src/components/GameScreen.tsx src/index.css e2e/iphone-gameflow.spec.ts playwright.webkit.config.ts
          git add -u scripts .github/workflows/package-o-apply.yml
          git commit -m "Fix iPhone game viewport and turn transitions"
          git push origin HEAD:${{ github.head_ref }}
