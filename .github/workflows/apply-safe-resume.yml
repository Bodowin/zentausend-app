name: Apply safe resume package

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-safe-resume.mjs
      - .github/workflows/apply-safe-resume.yml

permissions:
  contents: write

jobs:
  patch-test-build-e2e:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout validation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply guarded safe resume patch
        id: patch
        continue-on-error: true
        run: |
          set -o pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-safe-resume.mjs')
          source = path.read_text()
          old = """function replaceOnce(source, before, after, label) {
            const count = source.split(before).length - 1
            if (count !== 1) throw new Error(`${label}: expected 1 match, found ${count}`)
            return source.replace(before, after)
          }"""
          new = """function replaceOnce(source, before, after, label) {
            const count = source.split(before).length - 1
            if (label === 'safe start handler' && count >= 1) {
              const index = source.lastIndexOf(before)
              return source.slice(0, index) + after + source.slice(index + before.length)
            }
            if (count !== 1) throw new Error(`${label}: expected 1 match, found ${count}`)
            return source.replace(before, after)
          }"""
          if old not in source:
              raise SystemExit('replaceOnce guard block not found')
          path.write_text(source.replace(old, new))
          PY
          node --check scripts/apply-safe-resume.mjs 2>&1 | tee /tmp/package-j-patch.log
          node scripts/apply-safe-resume.mjs 2>&1 | tee -a /tmp/package-j-patch.log
          python - <<'PY' 2>&1 | tee -a /tmp/package-j-patch.log
          from pathlib import Path

          setup_path = Path('src/components/SetupScreen.tsx')
          setup = setup_path.read_text()
          start = setup.find('const startConfiguredGame = () => {')
          if start < 0:
              raise SystemExit('generated startConfiguredGame handler missing')
          line_start = setup.rfind('\n', 0, start) + 1
          end_marker = "    startConfiguredGame()\n  }\n\n"
          end = setup.find(end_marker, start)
          if end < 0:
              raise SystemExit('generated requestStart handler end missing')
          end += len(end_marker)
          setup = setup[:line_start] + setup[end:]

          handler = """  const startConfiguredGame = () => {
            setPrefs({ lastEvent: event.trim() })
            onStart(players, event, testMode, diceMode, goalScore, entryMin)
          }

          const requestStart = () => {
            if (resumable) {
              setStartConflictOpen(true)
              return
            }
            startConfiguredGame()
          }

          """
          anchor = "    setCodeDismissed(true)\n  }\n\n  return (\n"
          if setup.count(anchor) != 1:
              raise SystemExit(f'main component return anchor count: {setup.count(anchor)}')
          setup = setup.replace(anchor, "    setCodeDismissed(true)\n  }\n\n" + handler + "  return (\n")
          setup_path.write_text(setup)

          Path('src/safeResumeWiring.test.ts').write_text("""import { describe, expect, it } from 'vitest'
          import activeSource from './lib/activeGame.ts?raw'
          import setupSource from './components/SetupScreen.tsx?raw'

          describe('safe resume wiring', () => {
            it('keeps bounded backups and restores only a damaged primary value', () => {
              expect(activeSource).toContain('const RECOVERY_LIMIT = 3')
              expect(activeSource).toContain('if (!raw) return null')
              expect(activeSource).toContain('recoveredFromBackup: true')
            })

            it('requires an explicit decision before replacing or discarding a running game', () => {
              expect(setupSource).toContain('Laufendes Spiel ersetzen?')
              expect(setupSource).toContain('Altes Spiel fortsetzen')
              expect(setupSource).toContain('Endgültig verwerfen')
              expect(setupSource).not.toContain("window.confirm('Laufendes Spiel verwerfen?")
            })
          })
          """)
          print('Safe resume generated wiring normalized.')
          PY

      - name: Unit tests
        id: unit
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/package-j-unit.log

      - name: Production build
        id: build
        if: steps.patch.outcome == 'success' && steps.unit.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/package-j-build.log

      - name: Install Chromium
        id: chromium
        if: steps.patch.outcome == 'success' && steps.unit.outcome == 'success' && steps.build.outcome == 'success'
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Browser journeys
        id: e2e
        if: steps.chromium.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:e2e 2>&1 | tee /tmp/package-j-e2e.log

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-j-diagnostics
          path: /tmp/package-j-*.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Remove one-time machinery
        if: steps.e2e.outcome == 'success'
        run: |
          git rm -f scripts/apply-safe-resume.mjs .github/workflows/apply-safe-resume.yml
          git add -A

      - name: Commit validated safe resume update
        if: steps.e2e.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/activeGame.ts src/lib/activeGame.test.ts src/components/SetupScreen.tsx src/safeResumeWiring.test.ts e2e/app.spec.ts docs/package-j-safe-resume.md
          git commit -m "Protect and recover running games safely"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Fail failed validation
        if: steps.patch.outcome == 'failure' || steps.unit.outcome == 'failure' || steps.build.outcome == 'failure' || steps.chromium.outcome == 'failure' || steps.e2e.outcome == 'failure'
        run: exit 1
