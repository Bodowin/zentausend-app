name: Apply cloud identity sync

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-build-e2e:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'chatgpt/package-g-cloud-provisioning'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt/package-g-cloud-provisioning

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate guarded patch
        run: node --check scripts/apply-cloud-identity-sync.mjs

      - name: Apply cloud identity sync
        run: node scripts/apply-cloud-identity-sync.mjs

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser journeys
        run: npm run test:e2e

      - name: Remove one-time machinery
        run: git rm -f scripts/apply-cloud-identity-sync.mjs .github/workflows/apply-cloud-identity-sync.yml

      - name: Commit validated cloud sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/database.types.ts src/lib/playerIdentity.ts src/lib/playerIdentityState.ts src/lib/playerIdentityState.test.ts src/lib/playerIdentitySyncMeta.ts src/lib/playerIdentitySyncMeta.test.ts src/lib/playerIdentityCloud.ts src/lib/cloudAccess.ts src/lib/cloud.ts src/components/StatsScreen.tsx src/cloudIdentityWiring.test.ts e2e/player-identity-cloud.spec.ts docs/package-g-cloud-provisioning.md supabase/migrations/20260713204413_provision_cloud_state_and_harden_rls.sql supabase/migrations/20260713204507_rotate_legacy_codes_and_finalize_backup.sql supabase/migrations/20260713205109_add_clique_code_validation_rpc.sql
          git commit -m "Sync player identities through hardened cloud state"
          git push origin HEAD:chatgpt/package-g-cloud-provisioning
