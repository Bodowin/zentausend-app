name: Apply package L player profiles

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-player-profiles.mjs
      - .github/workflows/apply-player-profiles.yml

permissions:
  contents: write

jobs:
  patch-test-build-e2e:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout validation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply guarded player profile wiring
        run: |
          node scripts/apply-player-profiles.mjs
          grep -q "PlayerProfileScreen" src/components/StatsScreen.tsx
          grep -q "Profil von ' + s.name + ' öffnen" src/components/StatsScreen.tsx
          grep -q "Antippen für Profil" src/components/StatsScreen.tsx
          grep -q "const names = identityNameMap(history)" src/lib/storage.ts

      - name: Unit tests
        run: npm test

      - name: Production build
        run: |
          rm -rf dist
          npm run build
          grep -R -q "Antippen für Profil" dist/assets

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Player profile browser journey
        run: npx playwright test e2e/player-profiles.spec.ts

      - name: Complete browser suite
        run: npm run test:e2e

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-l-playwright-diagnostics
          path: |
            playwright-report
            test-results
            src/components/StatsScreen.tsx
            src/lib/storage.ts
          retention-days: 3

      - name: Remove one-time machinery
        run: git rm -f scripts/apply-player-profiles.mjs .github/workflows/apply-player-profiles.yml

      - name: Commit validated package L
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/StatsScreen.tsx src/components/PlayerProfileScreen.tsx src/lib/playerProfiles.ts src/lib/playerProfiles.test.ts src/lib/storage.ts src/lib/statsIdentityFilter.test.ts e2e/player-profiles.spec.ts docs/package-l-player-profiles.md docs/package-l-player-profiles-plan.md
          git commit -m "Add personal player profiles and performance trends"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
