name: Apply family sync on main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-family-sync-main.yml

permissions:
  contents: write

jobs:
  patch-test-build-e2e:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate guarded patch
        run: node --check scripts/apply-family-sync-main.mjs

      - name: Apply family sync
        run: node scripts/apply-family-sync-main.mjs

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser journeys
        run: npm run test:e2e

      - name: Remove one-time machinery
        run: git rm -f scripts/apply-family-sync-main.mjs .github/workflows/apply-family-sync-main.yml

      - name: Commit validated main update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/prefs.ts src/lib/haptics.ts src/lib/cloud.ts src/components/SettingsModal.tsx src/components/StatsScreen.tsx src/familySyncWiring.test.ts e2e/app.spec.ts e2e/player-identity-cloud.spec.ts docs/package-h-family-sync.md docs/roadmap-natural-dice.md
          git commit -m "Make cloud saving family-friendly and haptics optional"
          git push origin HEAD:main
